<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Tienda — Cantidad</title>
<link rel="stylesheet" href="/static/movil/comun.css">
<style>
  .info-bar {
    background: #fff; border-radius: 12px;
    padding: 10px 16px; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .info-bar span { font-size: 13px; font-weight: 600; color: #111827; }
  .info-bar small { font-size: 12px; color: #6b7280; }
  .cantidad-wrap {
    display: flex; align-items: center; justify-content: center;
    gap: 24px; margin: 16px 0;
  }
  .btn-cant {
    width: 68px; height: 68px; border-radius: 50%;
    background: #1e3a5f; color: #fff;
    border: none; font-size: 30px; cursor: pointer;
  }
  .btn-cant:active { background: #1e40af; transform: scale(.95); }
  .cant-num {
    font-size: 60px; font-weight: 800; color: #1e3a5f;
    min-width: 80px; text-align: center;
  }
</style>
</head>
<body>
<header>
  <button class="btn-atras" onclick="history.back()">‹</button>
  <h1>🏪 Mi Tienda</h1>
  <button class="btn-salir" onclick="salir()">Salir</button>
</header>
<main>
  <div class="paso-titulo">Paso 3 de 3</div>
  <div class="paso-pregunta">¿Cuántas unidades?</div>
  <div class="info-bar">
    <div><span id="art-nombre"></span><br><small id="cli-nombre"></small></div>
  </div>
  <div class="cantidad-wrap">
    <button class="btn-cant" onclick="cambiar(-1)">−</button>
    <div class="cant-num" id="cant">1</div>
    <button class="btn-cant" onclick="cambiar(1)">+</button>
  </div>
  <button class="btn-siguiente" onclick="siguiente()">Ver importe →</button>
</main>
<script>
const op  = JSON.parse(localStorage.getItem('operario') || 'null');
const art = JSON.parse(localStorage.getItem('articulo') || 'null');
const cli = JSON.parse(localStorage.getItem('cliente')  || 'null');
if (!op || !art || !cli) window.location.href = '/movil';

let cantidad = 1;
document.getElementById('art-nombre').textContent = art.descripcion;
document.getElementById('cli-nombre').textContent = cli.nombre + ' · ' + cli.ciudad;

function cambiar(d) {
  cantidad = Math.max(1, cantidad + d);
  document.getElementById('cant').textContent = cantidad;
}
function siguiente() {
  localStorage.setItem('cantidad', cantidad);
  window.location.href = '/static/movil/pago.html';
}
function salir() { localStorage.clear(); window.location.href = '/movil'; }
</script>
</body>
</html>
