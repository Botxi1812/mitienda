<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda — Acceso</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px 36px;
    width: 100%;
    max-width: 480px;
  }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; }
  .logo p  { font-size: 14px; color: #6b7280; margin-top: 6px; }
  h2 { font-size: 15px; font-weight: 600; color: #374151; margin-bottom: 16px; }
  .operario-list { display: flex; flex-direction: column; gap: 10px; }
  .op-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    background: #fff;
    cursor: pointer;
    transition: all .15s;
    text-align: left;
  }
  .op-btn:hover { border-color: #3b82f6; background: #eff6ff; transform: translateX(4px); }
  .op-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: #3b82f6; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; flex-shrink: 0;
  }
  .op-info { flex: 1; }
  .op-nombre { font-size: 15px; font-weight: 600; color: #111827; }
  .op-detalle { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .op-arrow { color: #9ca3af; font-size: 18px; }
  .loading { text-align: center; color: #9ca3af; padding: 20px; }
  .colors { background: #eff6ff; }
  .colors .op-avatar { background: #6366f1; }
  .color2 .op-avatar { background: #10b981; }
  .color3 .op-avatar { background: #f59e0b; }
  .color4 .op-avatar { background: #ef4444; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🏪 Mi Tienda</h1>
    <p>Selecciona tu usuario para continuar</p>
  </div>
  <h2>¿Quién eres?</h2>
  <div class="operario-list" id="lista">
    <div class="loading">Cargando operarios…</div>
  </div>
</div>

<script>
const colores = ['#3b82f6','#6366f1','#10b981','#f59e0b','#ef4444'];
fetch('/api/operarios')
  .then(r => r.json())
  .then(ops => {
    const lista = document.getElementById('lista');
    lista.innerHTML = '';
    ops.forEach((op, i) => {
      const btn = document.createElement('button');
      btn.className = 'op-btn';
      const iniciales = op.nombre.split(' ').map(p => p[0]).join('').slice(0,2).toUpperCase();
      btn.innerHTML = `
        <div class="op-avatar" style="background:${colores[i % colores.length]}">${iniciales}</div>
        <div class="op-info">
          <div class="op-nombre">${op.nombre}</div>
          <div class="op-detalle">${op.numero} · ${op.departamento}</div>
        </div>
        <div class="op-arrow">›</div>`;
      btn.onclick = () => {
        localStorage.setItem('operario', JSON.stringify(op));
        window.location.href = '/ventas';
      };
      lista.appendChild(btn);
    });
  })
  .catch(() => {
    document.getElementById('lista').innerHTML = '<div class="loading" style="color:red">Error conectando con el servidor</div>';
  });
</script>
</body>
</html>
