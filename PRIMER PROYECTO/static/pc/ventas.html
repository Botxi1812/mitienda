<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda — Nueva Venta</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #111827; }
  header {
    background: #1e3a5f; color: #fff;
    padding: 0 24px;
    height: 56px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  .user-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #3b82f6; display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px; }
  .nav-links { display:flex;gap:4px; }
  .nav-links a { color:#93c5fd;text-decoration:none;padding:6px 12px;border-radius:8px;font-size:13px;transition:background .15s; }
  .nav-links a:hover { background:rgba(255,255,255,.1); }
  .nav-links a.active { color:#fff;background:rgba(255,255,255,.15); }
  .btn-logout { background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px; }
  .btn-logout:hover { background:rgba(255,255,255,.1); }

  main { max-width: 900px; margin: 0 auto; padding: 24px; }
  .section { background:#fff;border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,.06);padding:24px;margin-bottom:20px; }
  .section h2 { font-size:15px;font-weight:600;color:#374151;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f3f4f6; }

  label { display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px; }
  select, input {
    width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;
    font-size:14px;color:#111827;background:#fff;transition:border .15s;
  }
  select:focus, input:focus { outline:none;border-color:#3b82f6; }

  .grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:16px; }

  /* Líneas tabla */
  .lineas-header {
    display:grid;grid-template-columns:1fr 100px 120px 100px 90px 36px;
    gap:8px;font-size:12px;font-weight:600;color:#6b7280;
    padding:0 4px 8px;border-bottom:1px solid #f3f4f6;
  }
  .linea-row {
    display:grid;grid-template-columns:1fr 100px 120px 100px 90px 36px;
    gap:8px;align-items:center;padding:8px 4px;
    border-bottom:1px solid #f9fafb;
  }
  .linea-row:last-child { border-bottom:none; }
  .precio-especial { font-size:11px;color:#f59e0b;font-weight:600; }
  .btn-del { background:none;border:none;color:#ef4444;cursor:pointer;font-size:18px;line-height:1; }
  .btn-del:hover { color:#b91c1c; }
  .importe-cell { font-weight:600;color:#1e3a5f;text-align:right; }

  .btn-add {
    display:flex;align-items:center;gap:8px;
    margin-top:14px;padding:10px 16px;
    background:#eff6ff;border:1.5px dashed #93c5fd;
    border-radius:10px;color:#3b82f6;font-size:13px;font-weight:500;
    cursor:pointer;transition:all .15s;width:100%;justify-content:center;
  }
  .btn-add:hover { background:#dbeafe;border-color:#3b82f6; }

  .totales { text-align:right;padding-top:14px;border-top:2px solid #f3f4f6;margin-top:4px; }
  .totales .total-label { font-size:13px;color:#6b7280; }
  .totales .total-num { font-size:28px;font-weight:700;color:#1e3a5f; }

  .btn-confirmar {
    width:100%;padding:16px;background:#1e3a5f;color:#fff;
    border:none;border-radius:12px;font-size:16px;font-weight:600;
    cursor:pointer;transition:background .15s;margin-top:8px;
  }
  .btn-confirmar:hover { background:#1e40af; }
  .btn-confirmar:disabled { background:#9ca3af;cursor:not-allowed; }

  /* Modal */
  .modal-bg { position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;display:none; }
  .modal-bg.show { display:flex; }
  .modal { background:#fff;border-radius:16px;padding:32px;max-width:360px;width:90%;text-align:center; }
  .modal h3 { font-size:20px;font-weight:700;color:#1e3a5f;margin-bottom:8px; }
  .modal p { font-size:14px;color:#6b7280;margin-bottom:24px; }
  .modal .num { font-size:32px;font-weight:800;color:#3b82f6; }
  .modal-btns { display:flex;gap:10px; }
  .modal-btns button { flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none; }
  .btn-nueva { background:#eff6ff;color:#3b82f6; }
  .btn-ver { background:#1e3a5f;color:#fff; }
  .empty-msg { text-align:center;color:#9ca3af;padding:20px;font-size:14px; }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:20px">
    <h1>🏪 Mi Tienda</h1>
    <nav class="nav-links">
      <a href="/ventas" class="active">Nueva venta</a>
      <a href="/consultas">Consultas</a>
      <span class="nav-sep">|</span>
      <a href="/clientes">Clientes</a>
      <a href="/trabajadores">Trabajadores</a>
      <a href="/articulos">Artículos</a>
      <a href="/departamentos">Departamentos</a>
          <span class="nav-sep">|</span>
      <a href="/configuracion">⚙️ Config</a>
    </nav>
  </div>
  <div class="user-info">
    <div class="avatar" id="avatar">?</div>
    <div>
      <div id="op-nombre" style="font-weight:600;font-size:13px"></div>
      <div id="op-detalle" style="font-size:11px;color:#93c5fd"></div>
    </div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</header>

<main>
  <!-- Cliente -->
  <div class="section">
    <h2>Cliente</h2>
    <div>
      <label>Buscar y seleccionar cliente</label>
      <input type="text" id="buscador-cli" placeholder="Escribe nombre o código..." oninput="filtrarClientes()" autocomplete="off">
      <select size="5" id="select-cli" style="margin-top:8px;height:140px;" onchange="clienteSeleccionado()" onclick="clienteSeleccionado()">
        <option value="">Cargando clientes…</option>
      </select>
      <div id="cli-info" style="font-size:13px;color:#6b7280;margin-top:8px"></div>
    </div>
  </div>

  <!-- Líneas -->
  <div class="section">
    <h2>Líneas de venta</h2>
    <div class="lineas-header">
      <span>Artículo</span><span>Cantidad</span><span>Precio unit.</span><span>Importe</span><span>Pago</span><span></span>
    </div>
    <div id="lineas-container">
      <div class="empty-msg">Añade artículos usando el botón de abajo</div>
    </div>
    <button class="btn-add" onclick="agregarLinea()">＋ Añadir artículo</button>
    <div class="totales">
      <div class="total-label">Total albarán</div>
      <div class="total-num" id="total-display">0,00 €</div>
    </div>
  </div>

  <!-- Confirmar -->
  <button class="btn-confirmar" id="btn-confirmar" onclick="confirmarVenta()">Confirmar venta</button>
</main>

<!-- Modal éxito -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div style="font-size:40px;margin-bottom:12px">✅</div>
    <h3>¡Venta registrada!</h3>
    <div class="num" id="modal-num"></div>
    <p id="modal-total"></p>
    <div class="modal-btns">
      <button class="btn-nueva" onclick="nuevaVenta()">Nueva venta</button>
      <button class="btn-ver" onclick="window.location='/consultas'">Ver consultas</button>
    </div>
  </div>
</div>

<script>
let operario = null, clientes = [], articulos = [], lineas = [];

// Cargar operario del localStorage
operario = JSON.parse(localStorage.getItem('operario') || 'null');
if (!operario) { window.location.href = '/'; }
else {
  const ini = operario.nombre.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('avatar').textContent = ini;
  document.getElementById('op-nombre').textContent = operario.nombre;
  document.getElementById('op-detalle').textContent = `${operario.numero} · ${operario.departamento}`;
}

function logout() { localStorage.clear(); window.location.href = '/'; }

// Cargar datos
Promise.all([
  fetch('/api/clientes').then(r=>r.json()),
  fetch('/api/articulos').then(r=>r.json())
]).then(([cls, arts]) => {
  clientes = cls;
  articulos = arts;
  renderClientes(clientes);
});

function renderClientes(lista) {
  const sel = document.getElementById('select-cli');
  sel.innerHTML = lista.length === 0
    ? '<option value="">Sin resultados</option>'
    : lista.map(c => `<option value="${c.id}" data-ciudad="${c.ciudad}" data-cod="${c.codigo}">${c.codigo} — ${c.nombre} (${c.ciudad})</option>`).join('');
}

function filtrarClientes() {
  const q = document.getElementById('buscador-cli').value.toLowerCase();
  renderClientes(q ? clientes.filter(c => (c.nombre+c.codigo+c.ciudad).toLowerCase().includes(q)) : clientes);
  document.getElementById('cli-info').textContent = '';
}

function clienteSeleccionado() {
  const sel = document.getElementById('select-cli');
  const opt = sel.selectedOptions[0];
  if (opt && opt.value) {
    document.getElementById('cli-info').textContent = `✓ ${opt.text}`;
    recalcularPrecios();
  }
}

function getClienteId() {
  const sel = document.getElementById('select-cli');
  return sel.value ? parseInt(sel.value) : null;
}

async function agregarLinea() {
  const idx = lineas.length;
  lineas.push({ articulo_id: null, cantidad: 1, precio: 0, especial: false, tipo_pago: '' });
  renderLineas();
  // Focus en el select del artículo recién añadido
  setTimeout(() => {
    const selects = document.querySelectorAll('.art-select');
    if (selects[idx]) selects[idx].focus();
  }, 50);
}

async function onArticuloChange(idx) {
  const sel = document.querySelectorAll('.art-select')[idx];
  const artId = parseInt(sel.value);
  if (!artId) return;
  lineas[idx].articulo_id = artId;
  const cliId = getClienteId();
  if (cliId) {
    const data = await fetch(`/api/precio/${cliId}/${artId}`).then(r=>r.json());
    lineas[idx].precio = data.precio;
    lineas[idx].especial = data.especial;
  } else {
    const art = articulos.find(a => a.id === artId);
    lineas[idx].precio = art ? art.precio : 0;
    lineas[idx].especial = false;
  }
  renderLineas();
  calcTotal();
}

async function recalcularPrecios() {
  const cliId = getClienteId();
  if (!cliId) return;
  for (let i = 0; i < lineas.length; i++) {
    if (lineas[i].articulo_id) {
      const data = await fetch(`/api/precio/${cliId}/${lineas[i].articulo_id}`).then(r=>r.json());
      lineas[i].precio = data.precio;
      lineas[i].especial = data.especial;
    }
  }
  renderLineas();
  calcTotal();
}

function onCantidadChange(idx) {
  const inputs = document.querySelectorAll('.cant-input');
  lineas[idx].cantidad = parseFloat(inputs[idx].value) || 1;
  calcTotal();
  actualizarImporte(idx);
}

function onPrecioChange(idx) {
  const inputs = document.querySelectorAll('.precio-input');
  lineas[idx].precio = parseFloat(inputs[idx].value) || 0;
  lineas[idx].especial = false;
  calcTotal();
  actualizarImporte(idx);
}

function actualizarImporte(idx) {
  const celdas = document.querySelectorAll('.importe-cell');
  if (celdas[idx]) celdas[idx].textContent = fmt(lineas[idx].cantidad * lineas[idx].precio) + ' €';
}

function eliminarLinea(idx) {
  lineas.splice(idx, 1);
  renderLineas();
  calcTotal();
}

function renderLineas() {
  const c = document.getElementById('lineas-container');
  if (lineas.length === 0) {
    c.innerHTML = '<div class="empty-msg">Añade artículos usando el botón de abajo</div>';
    return;
  }
  c.innerHTML = lineas.map((l, i) => `
    <div class="linea-row">
      <div>
        <select class="art-select" style="font-size:13px" onchange="onArticuloChange(${i})">
          <option value="">— selecciona artículo —</option>
          ${articulos.map(a => `<option value="${a.id}" ${a.id===l.articulo_id?'selected':''}>${a.codigo} — ${a.descripcion}</option>`).join('')}
        </select>
        ${l.especial ? '<div class="precio-especial">★ Precio especial</div>' : ''}
      </div>
      <input class="cant-input" type="number" min="0.01" step="0.01" value="${l.cantidad}" style="font-size:13px" oninput="onCantidadChange(${i})">
      <input class="precio-input" type="number" min="0" step="0.01" value="${l.precio}" style="font-size:13px" oninput="onPrecioChange(${i})">
      <select style="font-size:12px;padding:4px 6px;border:1.5px solid #e5e7eb;border-radius:8px" onchange="lineas[${i}].tipo_pago=this.value">
        <option value="" ${!l.tipo_pago?'selected':''}>—</option>
        <option value="contado" ${l.tipo_pago==='contado'?'selected':''}>Contado</option>
        <option value="credito" ${l.tipo_pago==='credito'?'selected':''}>Crédito</option>
      </select>
      <div class="importe-cell">${fmt(l.cantidad * l.precio)} €</div>
      <button class="btn-del" onclick="eliminarLinea(${i})">×</button>
    </div>`).join('');
}

function calcTotal() {
  const total = lineas.reduce((s, l) => s + (l.cantidad * l.precio), 0);
  document.getElementById('total-display').textContent = fmt(total) + ' €';
}

function fmt(n) {
  return Number(n).toLocaleString('es-ES', {minimumFractionDigits:2, maximumFractionDigits:2});
}

async function confirmarVenta() {
  const cliId = getClienteId();
  if (!cliId) return alert('Selecciona un cliente');
  if (lineas.length === 0) return alert('Añade al menos una línea');
  if (lineas.some(l => !l.articulo_id)) return alert('Hay líneas sin artículo seleccionado');

  document.getElementById('btn-confirmar').disabled = true;
  document.getElementById('btn-confirmar').textContent = 'Guardando…';

  const totalLocal = lineas.reduce((s, l) => s + l.cantidad * l.precio, 0);

  const body = {
    cliente_id: cliId,
    operario_id: operario.id,
    lineas: lineas.map(l => ({
      articulo_id: l.articulo_id,
      cantidad: l.cantidad,
      precio_unitario: l.precio,
      es_precio_especial: l.especial,
      tipo_pago: l.tipo_pago || ''
    }))
  };

  let res;
  try {
    res = await fetch('/api/albaranes', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    }).then(r => r.json());
  } catch (err) {
    document.getElementById('btn-confirmar').disabled = false;
    document.getElementById('btn-confirmar').textContent = 'Confirmar venta';
    alert('Error al guardar la venta. Comprueba que el servidor está activo.');
    return;
  }

  document.getElementById('btn-confirmar').disabled = false;
  document.getElementById('btn-confirmar').textContent = 'Confirmar venta';

  if (!res || !res.numero) {
    alert('Error del servidor al guardar la venta.');
    return;
  }

  document.getElementById('modal-num').textContent = res.numero;
  document.getElementById('modal-total').textContent = `Total: ${fmt(totalLocal)} €`;
  document.getElementById('modal').classList.add('show');
}

function nuevaVenta() {
  lineas = [];
  document.getElementById('select-cli').value = '';
  document.getElementById('buscador-cli').value = '';
  document.getElementById('cli-info').textContent = '';
  renderLineas();
  calcTotal();
  document.getElementById('modal').classList.remove('show');
}
</script>
</body>
</html>
