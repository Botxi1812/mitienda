<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda — Consultas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #111827; }
  header {
    background: #1e3a5f; color: #fff;
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  .nav-links { display:flex;gap:4px; }
  .nav-links a { color:#93c5fd;text-decoration:none;padding:6px 12px;border-radius:8px;font-size:13px;transition:background .15s; }
  .nav-links a:hover { background:rgba(255,255,255,.1); }
  .nav-links a.active { color:#fff;background:rgba(255,255,255,.15); }
  .user-info { display:flex;align-items:center;gap:10px;font-size:13px; }
  .avatar { width:32px;height:32px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px; }
  .btn-logout { background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px; }

  main { max-width: 1200px; margin: 0 auto; padding: 20px; }

  /* Filtros */
  .filtros {
    background:#fff;border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,.06);
    padding:20px 24px;margin-bottom:16px;
  }
  .filtros h2 { font-size:14px;font-weight:600;color:#374151;margin-bottom:14px; }
  .filtros-grid {
    display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;
  }
  .filtro-group label { display:block;font-size:12px;font-weight:500;color:#6b7280;margin-bottom:4px; }
  .filtro-group select, .filtro-group input {
    width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;
    font-size:13px;color:#111827;background:#fff;
  }
  .filtro-group select:focus, .filtro-group input:focus { outline:none;border-color:#3b82f6; }
  .filtros-actions { display:flex;gap:10px;margin-top:14px;align-items:center; }
  .btn-buscar {
    padding:9px 20px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;
    font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;
  }
  .btn-buscar:hover { background:#1e40af; }
  .btn-limpiar {
    padding:9px 16px;background:#f3f4f6;color:#374151;border:none;border-radius:8px;
    font-size:13px;cursor:pointer;
  }
  .resultado-count { font-size:13px;color:#6b7280;margin-left:auto; }

  /* Tabla */
  .tabla-wrap { background:#fff;border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,.06);overflow:hidden; }
  .tabla-scroll { overflow-x:auto; }
  table { width:100%;border-collapse:collapse;font-size:13px; }
  thead th {
    background:#1e3a5f;color:#fff;
    padding:11px 12px;text-align:left;font-weight:600;font-size:12px;
    white-space:nowrap;cursor:pointer;user-select:none;
  }
  thead th:hover { background:#1e40af; }
  thead th .sort-icon { margin-left:4px;opacity:.5; }
  tbody tr { border-bottom:1px solid #f3f4f6;transition:background .1s; }
  tbody tr:hover { background:#f9fafb; }
  tbody td { padding:10px 12px;white-space:nowrap; }
  .badge-esp {
    display:inline-block;font-size:10px;font-weight:600;
    background:#fef3c7;color:#b45309;padding:2px 7px;border-radius:10px;
  }
  .badge-normal {
    display:inline-block;font-size:10px;font-weight:600;
    background:#f3f4f6;color:#6b7280;padding:2px 7px;border-radius:10px;
  }
  .importe { font-weight:600;color:#1e3a5f; }
  .loading { text-align:center;color:#9ca3af;padding:40px; }
  .empty { text-align:center;color:#9ca3af;padding:40px;font-size:15px; }

  /* Resumen -->
  .resumen {
    display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px;
  }
  .res-card { background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.05);padding:16px 18px; }
  .res-label { font-size:12px;color:#6b7280;margin-bottom:4px; }
  .res-val { font-size:22px;font-weight:700;color:#1e3a5f; }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:20px">
    <h1>🏪 Mi Tienda</h1>
    <nav class="nav-links">
      <a href="/ventas">Nueva venta</a>
      <a href="/consultas" class="active">Consultas</a>
    </nav>
  </div>
  <div class="user-info">
    <div class="avatar" id="avatar">?</div>
    <div id="op-nombre" style="font-weight:600;font-size:13px"></div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</header>

<main>
  <!-- Filtros -->
  <div class="filtros">
    <h2>Filtros de búsqueda</h2>
    <div class="filtros-grid">
      <div class="filtro-group">
        <label>Fecha desde</label>
        <input type="date" id="f-desde">
      </div>
      <div class="filtro-group">
        <label>Fecha hasta</label>
        <input type="date" id="f-hasta">
      </div>
      <div class="filtro-group">
        <label>Operario</label>
        <select id="f-operario">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filtro-group">
        <label>Cliente</label>
        <select id="f-cliente">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filtro-group">
        <label>Artículo</label>
        <select id="f-articulo">
          <option value="">Todos</option>
        </select>
      </div>
    </div>
    <div class="filtros-actions">
      <button class="btn-buscar" onclick="buscar()">Buscar</button>
      <button class="btn-limpiar" onclick="limpiar()">Limpiar filtros</button>
      <span class="resultado-count" id="count"></span>
    </div>
  </div>

  <!-- Resumen -->
  <div class="resumen" id="resumen" style="display:none">
    <div class="res-card"><div class="res-label">Líneas</div><div class="res-val" id="r-lineas">0</div></div>
    <div class="res-card"><div class="res-label">Albaranes</div><div class="res-val" id="r-albaranes">0</div></div>
    <div class="res-card"><div class="res-label">Importe total</div><div class="res-val" id="r-total">0 €</div></div>
    <div class="res-card"><div class="res-label">Precios especiales</div><div class="res-val" id="r-especiales">0</div></div>
  </div>

  <!-- Tabla -->
  <div class="tabla-wrap">
    <div class="tabla-scroll">
      <table>
        <thead>
          <tr>
            <th onclick="ordenar('albaran')">Albarán <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('fecha')">Fecha <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('operario_num')">Nº Op. <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('operario')">Operario <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('departamento')">Depto. <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('cliente_cod')">Cód. Cliente <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('cliente')">Cliente <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('ciudad')">Ciudad <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('articulo_cod')">Cód. Art. <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('articulo')">Artículo <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('cantidad')" style="text-align:right">Cant. <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('precio_unitario')" style="text-align:right">Precio unit. <span class="sort-icon">↕</span></th>
            <th onclick="ordenar('importe')" style="text-align:right">Importe <span class="sort-icon">↕</span></th>
            <th>Tipo precio</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="14" class="loading">Usa los filtros y pulsa Buscar</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>
let operario = null, datos = [], sortCol = 'fecha', sortDir = -1;

operario = JSON.parse(localStorage.getItem('operario') || 'null');
if (!operario) { window.location.href = '/'; }
else {
  const ini = operario.nombre.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('avatar').textContent = ini;
  document.getElementById('op-nombre').textContent = operario.nombre;
}
function logout() { localStorage.clear(); window.location.href = '/'; }

// Cargar filtros
Promise.all([
  fetch('/api/operarios').then(r=>r.json()),
  fetch('/api/clientes').then(r=>r.json()),
  fetch('/api/articulos').then(r=>r.json())
]).then(([ops, cls, arts]) => {
  const fOp = document.getElementById('f-operario');
  ops.forEach(o => fOp.innerHTML += `<option value="${o.id}">${o.numero} — ${o.nombre}</option>`);
  const fCli = document.getElementById('f-cliente');
  cls.forEach(c => fCli.innerHTML += `<option value="${c.id}">${c.codigo} — ${c.nombre}</option>`);
  const fArt = document.getElementById('f-articulo');
  arts.forEach(a => fArt.innerHTML += `<option value="${a.id}">${a.codigo} — ${a.descripcion}</option>`);
});

// Fecha hoy por defecto
const hoy = new Date().toISOString().split('T')[0];
document.getElementById('f-hasta').value = hoy;

async function buscar() {
  document.getElementById('tbody').innerHTML = '<tr><td colspan="14" class="loading">Buscando…</td></tr>';
  const params = new URLSearchParams();
  const desde = document.getElementById('f-desde').value;
  const hasta = document.getElementById('f-hasta').value;
  const op    = document.getElementById('f-operario').value;
  const cli   = document.getElementById('f-cliente').value;
  const art   = document.getElementById('f-articulo').value;
  if (desde) params.append('fecha_desde', desde);
  if (hasta) params.append('fecha_hasta', hasta);
  if (op)    params.append('operario_id', op);
  if (cli)   params.append('cliente_id', cli);
  if (art)   params.append('articulo_id', art);

  datos = await fetch('/api/ventas?' + params).then(r=>r.json());
  renderTabla();
  renderResumen();
}

function limpiar() {
  document.getElementById('f-desde').value = '';
  document.getElementById('f-hasta').value = hoy;
  document.getElementById('f-operario').value = '';
  document.getElementById('f-cliente').value = '';
  document.getElementById('f-articulo').value = '';
}

function ordenar(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  renderTabla();
}

function renderTabla() {
  const sorted = [...datos].sort((a, b) => {
    const va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'number') return (va - vb) * sortDir;
    return String(va).localeCompare(String(vb)) * sortDir;
  });
  document.getElementById('count').textContent = `${sorted.length} líneas encontradas`;
  const tbody = document.getElementById('tbody');
  if (sorted.length === 0) {
    tbody.innerHTML = '<tr><td colspan="14" class="empty">Sin resultados para los filtros seleccionados</td></tr>';
    return;
  }
  tbody.innerHTML = sorted.map(l => `
    <tr>
      <td><strong>${l.albaran}</strong></td>
      <td>${l.fecha}</td>
      <td>${l.operario_num}</td>
      <td>${l.operario}</td>
      <td>${l.departamento}</td>
      <td>${l.cliente_cod}</td>
      <td>${l.cliente}</td>
      <td>${l.ciudad}</td>
      <td>${l.articulo_cod}</td>
      <td>${l.articulo}</td>
      <td style="text-align:right">${l.cantidad}</td>
      <td style="text-align:right">${fmt(l.precio_unitario)} €</td>
      <td style="text-align:right" class="importe">${fmt(l.importe)} €</td>
      <td>${l.especial ? '<span class="badge-esp">★ Especial</span>' : '<span class="badge-normal">Normal</span>'}</td>
    </tr>`).join('');
}

function renderResumen() {
  if (datos.length === 0) { document.getElementById('resumen').style.display = 'none'; return; }
  document.getElementById('resumen').style.display = 'grid';
  const albaranes = new Set(datos.map(l => l.albaran)).size;
  const total = datos.reduce((s, l) => s + l.importe, 0);
  const especiales = datos.filter(l => l.especial).length;
  document.getElementById('r-lineas').textContent = datos.length;
  document.getElementById('r-albaranes').textContent = albaranes;
  document.getElementById('r-total').textContent = fmt(total) + ' €';
  document.getElementById('r-especiales').textContent = especiales;
}

function fmt(n) {
  return Number(n).toLocaleString('es-ES', {minimumFractionDigits:2, maximumFractionDigits:2});
}

// Buscar al cargar (sin filtros = últimas ventas)
buscar();
</script>
</body>
</html>
