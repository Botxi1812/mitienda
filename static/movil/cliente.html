<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Tienda — Cliente</title>
<link rel="stylesheet" href="/static/movil/comun.css">
</head>
<body>
<header>
  <button class="btn-atras" onclick="history.back()">‹</button>
  <h1>🏪 Mi Tienda</h1>
  <button class="btn-salir" onclick="salir()">Salir</button>
</header>
<main>
  <div class="paso-titulo">Paso 2 de 3</div>
  <div class="paso-pregunta">¿A quién le vendes?</div>
  <div class="buscador-wrap">
    <span class="icono-buscar">🔍</span>
    <input type="text" id="buscador" placeholder="Nombre o código..." oninput="filtrar()" autocomplete="off">
  </div>
  <div class="lista-scroll" id="lista"></div>
</main>
<script>
const op  = JSON.parse(localStorage.getItem('operario') || 'null');
const art = JSON.parse(localStorage.getItem('articulo') || 'null');
if (!op || !art) window.location.href = '/movil';

let clientes = [];

fetch('/api/clientes')
  .then(r => r.json())
  .then(cls => { clientes = cls; render(clientes); });

function filtrar() {
  const q = document.getElementById('buscador').value.toLowerCase();
  render(q ? clientes.filter(c => (c.nombre + c.codigo).toLowerCase().includes(q)) : clientes);
}

function render(lista) {
  const div = document.getElementById('lista');
  div.innerHTML = '';
  if (lista.length === 0) {
    div.innerHTML = '<div style="text-align:center;color:#9ca3af;padding:20px">Sin resultados</div>';
    return;
  }
  lista.forEach(c => {
    const item = document.createElement('div');
    item.className = 'lista-item';
    item.innerHTML = `
      <div>
        <div class="lista-nombre">${c.nombre}</div>
        <div class="lista-sub">${c.codigo} · ${c.ciudad}</div>
      </div>
      <div class="lista-flecha">›</div>`;
    item.onclick = () => {
      localStorage.setItem('cliente', JSON.stringify(c));
      window.location.href = '/static/movil/cantidad.html';
    };
    div.appendChild(item);
  });
}

function salir() { localStorage.clear(); window.location.href = '/movil'; }
</script>
</body>
</html>
