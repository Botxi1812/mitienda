<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Tienda — Venta realizada</title>
<link rel="stylesheet" href="/static/movil/comun.css">
<style>
  main {
    align-items: center; justify-content: center;
    text-align: center; padding: 40px 24px;
  }
  .icono { font-size: 72px; margin-bottom: 16px; }
  .titulo { font-size: 26px; font-weight: 800; color: #1e3a5f; margin-bottom: 8px; }
  .ticket { font-size: 22px; font-weight: 700; color: #3b82f6; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #6b7280; margin-bottom: 48px; line-height: 1.6; }
  .btn-nueva {
    width: 100%; padding: 20px; border-radius: 16px;
    background: #1e3a5f; color: #fff; border: none;
    font-size: 18px; font-weight: 700; cursor: pointer; margin-bottom: 12px;
  }
  .btn-cambiar {
    width: 100%; padding: 16px; border-radius: 16px;
    background: #f3f4f6; color: #374151; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>
<header>
  <h1>🏪 Mi Tienda</h1>
</header>
<main>
  <div class="icono">✅</div>
  <div class="titulo">¡Venta realizada!</div>
  <div class="ticket" id="ticket"></div>
  <div class="sub" id="sub"></div>
  <button class="btn-nueva" onclick="nuevaVenta()">Nueva venta →</button>
  <button class="btn-cambiar" onclick="cambiarArticulo()">Cambiar artículo del día</button>
</main>
<script>
const alb = JSON.parse(localStorage.getItem('ultimo_ticket') || 'null');
const cli = JSON.parse(localStorage.getItem('cliente') || 'null');

if (alb) {
  document.getElementById('ticket').textContent = alb.numero;
  const tipo = alb.tipo === 'contado' ? 'Cobrado en efectivo' : 'A crédito';
  document.getElementById('sub').textContent =
    `${fmt(alb.total)} €  ·  ${tipo}\n${cli ? cli.nombre : ''}`;
}

function nuevaVenta() {
  // Mantiene operario y artículo, solo limpia cliente y cantidad
  localStorage.removeItem('cliente');
  localStorage.removeItem('cantidad');
  localStorage.removeItem('ultimo_ticket');
  window.location.href = '/static/movil/cliente.html';
}

function cambiarArticulo() {
  localStorage.removeItem('articulo');
  localStorage.removeItem('cliente');
  localStorage.removeItem('cantidad');
  localStorage.removeItem('ultimo_ticket');
  window.location.href = '/static/movil/articulo.html';
}

function fmt(n) {
  return Number(n).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
</script>
</body>
</html>
