<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Tienda</title>
<link rel="stylesheet" href="/static/movil/comun.css">
</head>
<body>
<header>
  <h1>🏪 Mi Tienda</h1>
</header>
<main>
  <div class="paso-titulo">Inicio</div>
  <div class="paso-pregunta">¿Quién eres?</div>
  <div id="lista"></div>
</main>
<script>
const colores = ['#3b82f6','#6366f1','#10b981','#f59e0b','#ef4444'];
fetch('/api/operarios')
  .then(r => r.json())
  .then(ops => {
    const lista = document.getElementById('lista');
    ops.forEach((op, i) => {
      const ini = op.nombre.split(' ').map(p => p[0]).join('').slice(0,2).toUpperCase();
      const btn = document.createElement('button');
      btn.className = 'opcion-btn';
      btn.innerHTML = `
        <div class="opcion-icono" style="background:${colores[i % colores.length]}">${ini}</div>
        <div>
          <div class="opcion-nombre">${op.nombre}</div>
          <div class="opcion-sub">${op.numero} · ${op.departamento}</div>
        </div>`;
      btn.onclick = () => {
        localStorage.setItem('operario', JSON.stringify(op));
        window.location.href = '/static/movil/articulo.html';
      };
      lista.appendChild(btn);
    });
  });
</script>
</body>
</html>
