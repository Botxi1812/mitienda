<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Tienda — Pago</title>
<link rel="stylesheet" href="/static/movil/comun.css">
<style>
  .btns-pago { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
  .btn-pago {
    padding: 22px; border-radius: 16px; border: none;
    font-size: 19px; font-weight: 700; cursor: pointer; width: 100%;
  }
  .btn-pago:active { transform: scale(.97); }
  .btn-contado { background: #1e3a5f; color: #fff; }
  .btn-credito { background: #f3f4f6; color: #374151; }
  .importe-grande {
    font-size: 52px; font-weight: 800; color: #1e3a5f;
    text-align: center; margin: 8px 0 4px;
  }
</style>
</head>
<body>
<header>
  <button class="btn-atras" onclick="history.back()">‹</button>
  <h1>🏪 Mi Tienda</h1>
  <button class="btn-salir" onclick="salir()">Salir</button>
</header>
<main>
  <div class="paso-titulo">Forma de pago</div>
  <div class="paso-pregunta">¿Cómo paga?</div>
  <div class="resumen-card" id="resumen"></div>
  <div class="btns-pago">
    <button class="btn-pago btn-contado" onclick="pagar('contado')">💵 Contado</button>
    <button class="btn-pago btn-credito" onclick="pagar('credito')">📋 Crédito</button>
  </div>
</main>
<script>
const op       = JSON.parse(localStorage.getItem('operario') || 'null');
const art      = JSON.parse(localStorage.getItem('articulo') || 'null');
const cli      = JSON.parse(localStorage.getItem('cliente')  || 'null');
const cantidad = parseInt(localStorage.getItem('cantidad') || '1');
if (!op || !art || !cli) window.location.href = '/movil';

let precio = 0, especial = false;

fetch(`/api/precio/${cli.id}/${art.id}`)
  .then(r => r.json())
  .then(data => {
    precio = data.precio;
    especial = data.especial;
    const importe = precio * cantidad;
    document.getElementById('resumen').innerHTML = `
      <div class="resumen-fila"><span class="resumen-label">Artículo</span><span class="resumen-valor">${art.descripcion}</span></div>
      <div class="resumen-fila"><span class="resumen-label">Cliente</span><span class="resumen-valor">${cli.nombre}</span></div>
      <div class="resumen-fila"><span class="resumen-label">Cantidad</span><span class="resumen-valor">${cantidad} ud.</span></div>
      <div class="resumen-fila">
        <span class="resumen-label">Precio unit.</span>
        <span class="resumen-valor">${fmt(precio)} € ${especial ? '<span class="badge-esp">★ Especial</span>' : ''}</span>
      </div>
      <div class="resumen-total">${fmt(importe)} €</div>`;
  });

async function pagar(tipo) {
  if (tipo === 'contado') {
    localStorage.setItem('tipopago', 'contado');
    window.location.href = '/static/movil/cobro.html';
  } else {
    await guardarVenta('credito');
  }
}

async function guardarVenta(tipo) {
  const res = await fetch('/api/albaranes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      cliente_id: cli.id,
      operario_id: op.id,
      lineas: [{ articulo_id: art.id, cantidad, precio_unitario: precio, es_precio_especial: especial }]
    })
  }).then(r => r.json());
  localStorage.setItem('ultimo_albaran', JSON.stringify({ ...res, tipo }));
  window.location.href = '/static/movil/exito.html';
}

function fmt(n) {
  return Number(n).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function salir() { localStorage.clear(); window.location.href = '/movil'; }
</script>
</body>
</html>
