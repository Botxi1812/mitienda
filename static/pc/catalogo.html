<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda — Catálogo</title>
<link rel="stylesheet" href="/static/pc/comun.css">
</head>
<body>

<header>
  <div id="cat-header-titulo" style="display:flex;align-items:center;gap:16px">
    <h1>&#127978; Mi Tienda</h1>
    <nav class="nav-links" id="nav-dinamica"></nav>
  </div>
  <div class="user-info">
    <div class="avatar" id="avatar">?</div>
    <div id="op-nombre"></div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</header>

<main>
  <!-- Perfiles de vista -->
  <div class="perfiles-bar">
    <label>Vista:</label>
    <select class="perfil-select" id="perfil-select" onchange="catAplicarPerfil(this.value)">
      <option value="">— sin perfil —</option>
    </select>
    <button class="btn-perfil btn-perfil-guardar" onclick="catAbrirModalPerfil()">&#128190; Guardar vista</button>
    <button class="btn-perfil btn-perfil-borrar" id="btn-borrar-perfil" onclick="catBorrarPerfil()" style="display:none">&#128465;&#65039; Borrar esta vista</button>
    <span id="perfil-info" style="font-size:12px;color:#9ca3af;margin-left:auto"></span>
  </div>

  <!-- Toolbar búsqueda + botón nuevo -->
  <div class="toolbar" id="cat-toolbar">
    <span style="color:#9ca3af">Cargando…</span>
  </div>

  <!-- Tabla -->
  <div class="tabla-wrap"><div class="tabla-scroll">
    <table>
      <colgroup id="cat-colgroup"></colgroup>
      <thead id="cat-thead"></thead>
      <tbody id="cat-tbody"><tr><td class="empty">Cargando…</td></tr></tbody>
    </table>
  </div></div>
</main>

<!-- Modal registro -->
<div class="modal-bg" id="cat-modal">
  <div class="modal">
    <div class="modal-titulo">
      <span id="cat-m-titulo">Registro</span>
      <button class="btn-cerrar" onclick="catCerrar()">&#215;</button>
    </div>
    <div class="msg msg-error" id="cat-msg-error" style="display:none"></div>
    <div class="msg msg-ok"    id="cat-msg-ok"    style="display:none"></div>
    <div id="cat-modal-campos"></div>
    <div id="cat-campos-extra"></div>
    <div class="modal-footer">
      <button class="btn-cancelar" onclick="catCerrar()">Cancelar</button>
      <button class="btn-guardar"  onclick="catGuardar()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal perfil -->
<div class="modal-perfil-bg" id="modal-perfil">
  <div class="modal-perfil">
    <h3>&#128190; Guardar vista actual</h3>
    <input id="perfil-nombre" type="text" placeholder="Vista rápida, Vista básica…">
    <div style="font-size:11px;font-weight:600;color:#6b7280;margin-bottom:8px;text-transform:uppercase">Columnas visibles</div>
    <div class="perfil-cols-grid" id="perfil-cols-check"></div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button onclick="catCerrarModalPerfil()" style="flex:1;padding:10px;background:#f3f4f6;border:none;border-radius:8px;cursor:pointer;font-size:14px">Cancelar</button>
      <button onclick="catGuardarPerfil()" style="flex:1;padding:10px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600">Guardar</button>
    </div>
  </div>
</div>

<script src="/static/pc/comun.js"></script>
<!-- window.__TABLA__ se define en el wrapper de cada página -->
<script src="/static/pc/catalogo.js"></script>
</body>
</html>
