<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda — Ventas</title>
<link rel="stylesheet" href="/static/pc/comun.css">
<style>
  .filtros { background:#fff;border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,.06);padding:18px 20px;margin-bottom:14px; }
  .filtros-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:12px; }
  .fg label { display:block;font-size:11px;font-weight:600;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px; }
  .fg select,.fg input { width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px; }
  .fg select:focus,.fg input:focus { outline:none;border-color:#3b82f6; }
  .filtros-actions { display:flex;gap:8px;align-items:center;flex-wrap:wrap; }
  .btn-buscar { padding:8px 18px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer; }
  .btn-buscar:hover { background:#1e40af; }
  .btn-limpiar { padding:8px 14px;background:#f3f4f6;color:#374151;border:none;border-radius:8px;font-size:13px;cursor:pointer; }
  .btn-avanzado { padding:8px 14px;background:#fff7ed;color:#b45309;border:1.5px solid #fed7aa;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer; }
  .btn-avanzado:hover,.btn-avanzado.activo { background:#fed7aa; }
  .res-count { font-size:13px;color:#6b7280;margin-left:auto; }
  #filtros-extra { margin-top:10px;display:none; }
  #filtros-extra .fg label { color:#7c3aed; }
  #filtros-extra select { border-color:#ddd6fe; }
  .panel-avanzado { display:none;background:#fff8ed;border-radius:10px;padding:14px;margin-top:10px;border:1px solid #fed7aa; }
  .panel-avanzado.show { display:block; }
  .panel-avanzado-titulo { font-size:13px;font-weight:600;color:#b45309;margin-bottom:10px; }
  #busq-aviso { font-size:12px;color:#b45309;margin-top:8px; }
  .resumen { display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px; }
  .res-card { background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.05);padding:14px 16px; }
  .res-label { font-size:11px;color:#6b7280;margin-bottom:3px; }
  .res-val { font-size:20px;font-weight:700;color:#1e3a5f; }
  .barra-edicion { display:none;align-items:center;gap:10px;background:#1e3a5f;border-radius:12px;padding:12px 18px;margin-bottom:12px; }
  .barra-edicion.show { display:flex; }
  .barra-edicion span { color:#93c5fd;font-size:13px;flex:1; }
  .btn-guardar-ed { padding:8px 20px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer; }
  .btn-guardar-ed:hover { background:#047857; }
  .btn-cancelar-ed { padding:8px 14px;background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer; }
  .tabla-wrap { background:#fff;border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,.06);overflow:hidden; }
  .tabla-scroll { overflow-x:auto; }
  table { width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed; }
  thead th { background:#1e3a5f;color:#fff;padding:10px;text-align:left;font-weight:600;font-size:11px;white-space:nowrap;user-select:none;position:relative;overflow:hidden; }
  thead th.sortable { cursor:pointer; }
  thead th.sortable:hover { background:#1e40af; }
  thead th.drag-over { background:#2563eb !important; }
  .resize-handle { position:absolute;right:0;top:0;width:6px;height:100%;cursor:col-resize;z-index:2; }
  .resize-handle:hover { background:rgba(255,255,255,.35); }
  tbody tr { border-bottom:1px solid #f3f4f6;transition:background .1s; }
  tbody tr:hover { background:#f9fafb; }
  tbody tr.modificada { background:#fefce8; }
  tbody tr.modificada:hover { background:#fef9c3; }
  tbody td { padding:8px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .badge-esp { display:inline-block;font-size:10px;font-weight:600;background:#fef3c7;color:#b45309;padding:1px 6px;border-radius:8px; }
  .badge-mod { display:inline-block;font-size:10px;font-weight:600;background:#dbeafe;color:#1d4ed8;padding:1px 6px;border-radius:8px; }
  .empty { text-align:center;color:#9ca3af;padding:40px; }
  .ed-input { width:100%;padding:4px 6px;border:1.5px solid #3b82f6;border-radius:6px;font-size:12px;background:#eff6ff; }
  .ed-select { width:100%;padding:4px 6px;border:1.5px solid #3b82f6;border-radius:6px;font-size:12px;background:#eff6ff; }
  .btn-del-linea { background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px;padding:0 4px; }
  .btn-del-linea:hover { color:#b91c1c; }
  .btn-editar { padding:8px 18px;background:#f59e0b;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer; }
  .btn-editar:hover { background:#d97706; }
  .btn-editar.activo { background:#ef4444; }
  .btn-editar.activo:hover { background:#b91c1c; }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:16px">
    <h1>&#127978; Mi Tienda</h1>
    <nav class="nav-links" id="nav-dinamica"></nav>
  </div>
  <div class="user-info">
    <div class="avatar" id="avatar">?</div>
    <div id="op-nombre" style="font-weight:600;font-size:13px"></div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</header>

<main>
  <!-- Perfiles -->
  <div class="perfiles-bar">
    <label>Vista:</label>
    <select class="perfil-select" id="perfil-select" onchange="aplicarPerfil(this.value)">
      <option value="">— sin perfil —</option>
    </select>
    <button class="btn-perfil btn-perfil-guardar" onclick="abrirModalPerfil()">&#128190; Guardar vista</button>
    <button class="btn-perfil btn-perfil-borrar" id="btn-borrar-perfil" onclick="borrarPerfil()" style="display:none">&#128465;&#65039; Borrar esta vista</button>
    <span id="perfil-info" style="font-size:12px;color:#9ca3af;margin-left:auto"></span>
  </div>

  <!-- Filtros -->
  <div class="filtros">
    <div class="filtros-grid" id="filtros-principales">
      <div class="fg"><label>Fecha desde</label><input type="date" id="f-desde"></div>
      <div class="fg"><label>Fecha hasta</label><input type="date" id="f-hasta"></div>
      <!-- Filtros de tablas cargados dinámicamente -->
    </div>
    <div id="filtros-extra" class="filtros-grid"></div>
    <div class="panel-avanzado" id="panel-avanzado">
      <div class="panel-avanzado-titulo">&#128269; Búsqueda avanzada — busca en todo el histórico sin necesidad de fecha</div>
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
        <div class="fg" style="min-width:160px"><label>Campo</label><select id="busq-campo"></select></div>
        <div class="fg" style="min-width:180px"><label>Valor</label><input id="busq-valor" type="text" placeholder="Valor a buscar"></div>
        <button onclick="busquedaAvanzada()" class="btn-buscar" style="margin-bottom:0">Buscar en histórico</button>
      </div>
      <div id="busq-aviso"></div>
    </div>
    <div class="filtros-actions">
      <button class="btn-buscar" onclick="buscar()">Buscar</button>
      <button class="btn-limpiar" onclick="limpiar()">Limpiar</button>
      <button class="btn-avanzado" id="btn-avanzado" onclick="togglePanelAvanzado()">&#128269; Avanzado</button>
      <button class="btn-editar" id="btn-editar" onclick="toggleEdicion()" style="display:none">&#9998;&#65039; Editar selección</button>
      <span class="res-count" id="res-count"></span>
    </div>
  </div>

  <!-- Barra edición -->
  <div class="barra-edicion" id="barra-edicion">
    <span id="barra-msg">Modo edición activo — modifica las celdas y pulsa Guardar</span>
    <button class="btn-cancelar-ed" onclick="cancelarEdicion()">Cancelar</button>
    <button class="btn-guardar-ed"  onclick="guardarEdicion()">Guardar cambios</button>
  </div>

  <!-- Resumen -->
  <div class="resumen" id="resumen" style="display:none">
    <div class="res-card"><div class="res-label">Líneas</div><div class="res-val" id="r-lineas"></div></div>
    <div class="res-card"><div class="res-label">Ticketes</div><div class="res-val" id="r-ventas"></div></div>
    <div class="res-card"><div class="res-label">Importe total</div><div class="res-val" id="r-total"></div></div>
    <div class="res-card"><div class="res-label">Precios especiales</div><div class="res-val" id="r-esp"></div></div>
    <div class="res-card"><div class="res-label">Modificadas</div><div class="res-val" id="r-mod"></div></div>
  </div>

  <!-- Tabla -->
  <div class="tabla-wrap"><div class="tabla-scroll">
    <table id="tabla-main">
      <colgroup id="colgroup"></colgroup>
      <thead id="thead"></thead>
      <tbody id="tbody"><tr><td colspan="17" class="empty">Usa los filtros y pulsa Buscar</td></tr></tbody>
    </table>
  </div></div>
</main>

<!-- Modal perfil -->
<div class="modal-perfil-bg" id="modal-perfil">
  <div class="modal-perfil">
    <h3>&#128190; Guardar vista actual</h3>
    <input id="perfil-nombre" type="text" placeholder="Vista rápida, Vista completa…">
    <div style="display:flex;gap:10px">
      <button onclick="cerrarModalPerfil()" style="flex:1;padding:10px;background:#f3f4f6;border:none;border-radius:8px;cursor:pointer;font-size:14px">Cancelar</button>
      <button onclick="guardarPerfil()" style="flex:1;padding:10px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600">Guardar</button>
    </div>
  </div>
</div>

<script src="/static/pc/comun.js"></script>
<script>
// ── Estado ────────────────────────────────────────────────────────────────────
const operario = initHeader();
renderNavDinamica();

let datos = [], articulos = [], modoEdicion = false;
let sortCol = 'fecha', sortDir = -1;
let originales = {};

// Columnas dinámicas (cargadas desde /api/consultas/config)
let COLS_CFG = [];        // [{campo, etiqueta, ancho_default, en_default, tipo_render, ...}]
let COLS_LABELS  = {};
let ANCHO_DEFAULT = {};
let clavesFijas  = new Set();

// Drag & resize
let anchos = {};
let resizingCol = null, resizeStartX = 0, resizeStartW = 0;
let dragCol = null;
let columnasOrden = [];

// Filtros de tablas (cargados dinámicamente)
let _tablasFiltrables = [];   // tabla_definiciones con en_filtros=1
let _datosFiltrables  = {};   // {tabla: [...registros]}

// ── Carga inicial ─────────────────────────────────────────────────────────────
const hoy = new Date().toISOString().split('T')[0];
document.getElementById('f-hasta').value = hoy;

async function init() {
  // 1. Cargar config de columnas
  COLS_CFG = await fetch('/api/consultas/config').then(r => r.json());
  COLS_LABELS   = {};
  ANCHO_DEFAULT = {};
  clavesFijas   = new Set(['id','cliente_id','ticket_id','articulo_id']);
  COLS_CFG.forEach(c => {
    COLS_LABELS[c.campo]   = c.etiqueta;
    ANCHO_DEFAULT[c.campo] = c.ancho_default;
    clavesFijas.add(c.campo);
  });
  columnasOrden = COLS_CFG.filter(c => c.en_default).map(c => c.campo);

  // 2. Cargar tablas filtrables y sus registros
  _tablasFiltrables = await fetch('/api/tablas?en_filtros=1').then(r => r.json());
  await Promise.all(_tablasFiltrables.map(async t => {
    _datosFiltrables[t.nombre] = await fetch(`/api/entidad/${t.nombre}`).then(r => r.json());
  }));
  // Articulos para modo edición (aunque en_filtros=0, necesitamos la lista)
  articulos = await fetch('/api/entidad/articulos').then(r => r.json());

  // 3. Render filtros dinámicos
  renderFiltrosPrincipales();

  // 4. Inicializar búsqueda avanzada
  actualizarSelectBusqAvanzada();

  // 5. Cargar perfiles
  if (operario) await cargarPerfiles();

  // 6. Búsqueda inicial
  buscar();
}

// ── Filtros ───────────────────────────────────────────────────────────────────
function renderFiltrosPrincipales() {
  const contenedor = document.getElementById('filtros-principales');
  let html = `
    <div class="fg"><label>Fecha desde</label><input type="date" id="f-desde"></div>
    <div class="fg"><label>Fecha hasta</label><input type="date" id="f-hasta" value="${hoy}"></div>`;

  _tablasFiltrables.forEach(t => {
    const cp = t.campo_principal, cs = t.campo_secundario;
    const registros = _datosFiltrables[t.nombre] || [];
    html += `<div class="fg"><label>${t.etiqueta_singular}</label>
      <select id="f-${t.nombre}">
        <option value="">Todos</option>
        ${registros.map(r => {
          const label = cs ? `${r[cs]||''} — ${r[cp]||''}` : (r[cp] || r.nombre || r.id);
          return `<option value="${r.id}">${label}</option>`;
        }).join('')}
      </select></div>`;
  });

  contenedor.innerHTML = html;
}

function limpiar() {
  document.getElementById('f-desde').value = '';
  document.getElementById('f-hasta').value = hoy;
  _tablasFiltrables.forEach(t => {
    const el = document.getElementById(`f-${t.nombre}`);
    if (el) el.value = '';
  });
}

// ── Buscar ────────────────────────────────────────────────────────────────────
async function buscar() {
  if (modoEdicion) cancelarEdicion();
  document.getElementById('tbody').innerHTML = `<tr><td colspan="${columnasOrden.length}" class="empty">Buscando…</td></tr>`;
  const params = new URLSearchParams();
  const desde = document.getElementById('f-desde')?.value;
  const hasta = document.getElementById('f-hasta')?.value;
  if (desde) params.append('fecha_desde', desde);
  if (hasta) params.append('fecha_hasta', hasta);

  // Parámetros de tablas filtrables → mapear a nombres que entiende /api/ventas
  const PARAM_MAP = { clientes: 'cliente_id', operarios: 'operario_id', articulos: 'articulo_id' };
  _tablasFiltrables.forEach(t => {
    const el  = document.getElementById(`f-${t.nombre}`);
    const key = PARAM_MAP[t.nombre] || (t.nombre.replace(/s$/, '') + '_id');
    if (el?.value) params.append(key, el.value);
  });
  // Artículo también aunque no esté en en_filtros (compatible con API)
  const fArt = document.getElementById('f-articulos');
  if (!fArt) {
    // Artículos no es filtrable, no añadir param
  }

  datos = await fetch('/api/ventas?' + params).then(r => r.json());

  // Detectar campos extra dinámicos (keys no en clavesFijas)
  const camposExtraDetectados = [];
  const vistas = new Set();
  datos.forEach(l => Object.keys(l).forEach(k => {
    if (!clavesFijas.has(k) && !vistas.has(k)) { vistas.add(k); camposExtraDetectados.push(k); }
  }));
  window._camposExtra = camposExtraDetectados;

  if (!perfilActivo) {
    columnasOrden = [...COLS_CFG.filter(c => c.en_default).map(c => c.campo), ...camposExtraDetectados];
  } else {
    const nuevos = camposExtraDetectados.filter(k => !columnasOrden.includes(k));
    columnasOrden = [...columnasOrden, ...nuevos];
  }

  originales = {};
  datos.forEach(l => { originales[l.id] = {...l}; });

  renderTabla();
  renderResumen();
  document.getElementById('btn-editar').style.display = datos.length ? 'block' : 'none';
  renderFiltrosExtra();
  actualizarSelectBusqAvanzada();
}

// ── P2: Filtros extra dinámicos ───────────────────────────────────────────────
function renderFiltrosExtra() {
  const divFE = document.getElementById('filtros-extra');
  const extras = window._camposExtra || [];
  if (!extras.length) { divFE.style.display = 'none'; divFE.innerHTML = ''; return; }
  const filtrosVals = {};
  datos.forEach(l => extras.forEach(k => {
    const v = l[k];
    if (v !== undefined && v !== '') {
      if (!filtrosVals[k]) filtrosVals[k] = new Set();
      filtrosVals[k].add(String(v));
    }
  }));
  const campos = Object.entries(filtrosVals).filter(([,v]) => v.size > 0);
  if (!campos.length) { divFE.style.display = 'none'; divFE.innerHTML = ''; return; }
  divFE.style.display = 'grid';
  divFE.innerHTML = campos.map(([k, vals]) => `
    <div class="fg">
      <label>${k.replace(/_/g,' ')}</label>
      <select id="fe-${k}" onchange="filtrarExtra()">
        <option value="">Todos</option>
        ${[...vals].sort().map(v => `<option>${v}</option>`).join('')}
      </select>
    </div>`).join('');
}

function filtrarExtra() {
  const extras = window._camposExtra || [];
  const activos = {};
  extras.forEach(k => {
    const sel = document.getElementById(`fe-${k}`);
    if (sel?.value) activos[k] = sel.value;
  });
  const filtrados = Object.keys(activos).length
    ? datos.filter(l => Object.entries(activos).every(([k,v]) => String(l[k]||'') === v))
    : datos;
  renderTabla(filtrados);
}

// ── P3: Búsqueda avanzada ─────────────────────────────────────────────────────
function togglePanelAvanzado() {
  document.getElementById('panel-avanzado').classList.toggle('show');
  document.getElementById('btn-avanzado').classList.toggle('activo');
}

function actualizarSelectBusqAvanzada() {
  const sel = document.getElementById('busq-campo');
  const extras = window._camposExtra || [];
  // Campos indexables: los de consultas_config con tipo_render != 'bold' y no fecha
  const opciones = COLS_CFG
    .filter(c => !['ticket','fecha'].includes(c.campo))
    .map(c => ({k: c.campo, l: c.etiqueta}));
  extras.forEach(k => opciones.push({k, l: k.replace(/_/g,' ')}));
  sel.innerHTML = opciones.map(o => `<option value="${o.k}">${o.l}</option>`).join('');
}

async function busquedaAvanzada() {
  const campo = document.getElementById('busq-campo').value;
  const valor = document.getElementById('busq-valor').value.trim();
  const aviso = document.getElementById('busq-aviso');
  if (!campo || !valor) { aviso.textContent = 'Elige un campo y escribe un valor.'; return; }
  aviso.textContent = 'Buscando…';
  datos = await fetch(`/api/ventas/buscar_campo?campo=${encodeURIComponent(campo)}&valor=${encodeURIComponent(valor)}`).then(r => r.json());
  aviso.textContent = datos.length ? `${datos.length} líneas encontradas` : 'Sin resultados';
  originales = {};
  datos.forEach(l => { originales[l.id] = {...l}; });
  renderTabla(); renderResumen();
  document.getElementById('btn-editar').style.display = datos.length ? 'block' : 'none';
}

// ── Resize & Drag ─────────────────────────────────────────────────────────────
function getAncho(k) { return anchos[k] || ANCHO_DEFAULT[k] || 120; }

function iniciarResize(e, campo) {
  resizingCol   = campo;
  resizeStartX  = e.clientX;
  resizeStartW  = getAncho(campo);
  document.addEventListener('mousemove', onResize);
  document.addEventListener('mouseup',   finResize);
  e.stopPropagation(); e.preventDefault();
}
function onResize(e) {
  if (!resizingCol) return;
  anchos[resizingCol] = Math.max(50, resizeStartW + (e.clientX - resizeStartX));
  const cols = document.querySelectorAll('#colgroup col');
  const idx  = columnasOrden.indexOf(resizingCol);
  if (idx >= 0 && cols[idx]) cols[idx].style.width = anchos[resizingCol] + 'px';
}
function finResize() {
  document.removeEventListener('mousemove', onResize);
  document.removeEventListener('mouseup',   finResize);
  if (resizingCol && perfilActivo) guardarConfigPerfil();
  resizingCol = null;
}

function dragStart(campo) { dragCol = campo; }
function dragOver(e, campo) { e.preventDefault(); document.querySelector(`th[data-campo="${campo}"]`)?.classList.add('drag-over'); }
function dragLeave(campo)   { document.querySelector(`th[data-campo="${campo}"]`)?.classList.remove('drag-over'); }
function dragDrop(destino)  {
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('drag-over'));
  if (!dragCol || dragCol === destino) { dragCol = null; return; }
  const from = columnasOrden.indexOf(dragCol);
  const to   = columnasOrden.indexOf(destino);
  if (from < 0 || to < 0) { dragCol = null; return; }
  columnasOrden.splice(from, 1);
  columnasOrden.splice(to, 0, dragCol);
  dragCol = null;
  renderTabla();
  if (perfilActivo) guardarConfigPerfil();
}

function ord(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  renderTabla();
}

// ── Render cabecera ───────────────────────────────────────────────────────────
function renderCabecera() {
  if (modoEdicion) {
    const colsEd = [
      {k:'ticket',l:'Ticket',w:90},{k:'fecha',l:'Fecha',w:130},
      {k:'operario',l:'Operario',w:120},{k:'departamento',l:'Depto.',w:100},
      {k:'cliente',l:'Cliente',w:140},
      {k:'articulo',l:'Artículo ✏️',w:180},{k:'cantidad',l:'Cant. ✏️',w:70},
      {k:'precio_unitario',l:'Precio ✏️',w:90},{k:'importe',l:'Importe',w:90},
      {k:'tipo_pago',l:'Pago ✏️',w:90},{k:'_del',l:'',w:40},
    ];
    document.getElementById('colgroup').innerHTML = colsEd.map(c => `<col style="width:${c.w}px">`).join('');
    document.getElementById('thead').innerHTML = '<tr>' +
      colsEd.map(c => c.k==='_del'
        ? `<th></th>`
        : `<th class="sortable" onclick="ord('${c.k}')">${c.l}</th>`
      ).join('') + '</tr>';
    return;
  }
  document.getElementById('colgroup').innerHTML =
    columnasOrden.map(k => `<col style="width:${getAncho(k)}px">`).join('');
  document.getElementById('thead').innerHTML = '<tr>' +
    columnasOrden.map(k => {
      const l = COLS_LABELS[k] || k.replace(/_/g,' ');
      return `<th class="sortable" data-campo="${k}"
        onclick="ord('${k}')" draggable="true"
        ondragstart="dragStart('${k}')" ondragover="dragOver(event,'${k}')"
        ondragleave="dragLeave('${k}')" ondrop="dragDrop('${k}')">
        ${l} ↕<div class="resize-handle" onmousedown="iniciarResize(event,'${k}')"></div></th>`;
    }).join('') + '</tr>';
}

// ── Render celda según tipo_render ────────────────────────────────────────────
function renderCell(l, k) {
  const cfg = COLS_CFG.find(c => c.campo === k);
  const tipo = cfg?.tipo_render || '';
  const v = l[k];
  if (v === undefined || v === null || v === '') {
    // Campos sin valor
    return `<td style="color:#9ca3af">—</td>`;
  }
  switch(tipo) {
    case 'bold':
      return `<td><strong>${v}</strong>${l.modificado_por?' <span class="badge-mod">&#9998;</span>':''}</td>`;
    case 'moneda':
      return `<td style="text-align:right">${fmt(v)} €</td>`;
    case 'importe':
      return `<td style="text-align:right;font-weight:600;color:#1e3a5f">${fmt(v)} €</td>`;
    case 'cantidad':
      return `<td style="text-align:right">${v}</td>`;
    case 'badge_especial':
      return `<td>${v ? '<span class="badge-esp">&#9733; Esp.</span>' : 'Normal'}</td>`;
    case 'subdued':
      return `<td style="font-size:11px;color:#6b7280">${v || '—'}</td>`;
    default:
      return `<td>${v}</td>`;
  }
}

// ── Render tabla ──────────────────────────────────────────────────────────────
function renderTabla(datosRender) {
  renderCabecera();
  const lista  = datosRender || datos;
  const sorted = [...lista].sort((a,b) => {
    const va=a[sortCol]??'', vb=b[sortCol]??'';
    if (typeof va==='number') return (va-vb)*sortDir;
    return String(va).localeCompare(String(vb),'es')*sortDir;
  });
  document.getElementById('res-count').textContent = sorted.length + ' líneas';
  const tb = document.getElementById('tbody');
  if (!sorted.length) {
    tb.innerHTML = `<tr><td colspan="${columnasOrden.length}" class="empty">Sin resultados</td></tr>`;
    return;
  }
  if (modoEdicion) {
    tb.innerHTML = sorted.map(l => {
      const optsArt = articulos.map(a =>
        `<option value="${a.id}" ${a.id===l.articulo_id?'selected':''}>${a.codigo} — ${a.descripcion}</option>`
      ).join('');
      return `<tr data-id="${l.id}" class="${l.modificado_por?'modificada':''}">
        <td><strong>${l.ticket}</strong></td><td>${l.fecha}</td>
        <td>${l.operario}</td><td>${l.departamento||'—'}</td><td>${l.cliente}</td>
        <td><select class="ed-select" data-field="articulo_id" onchange="articuloCambiado(${l.id},this)">${optsArt}</select></td>
        <td><input class="ed-input" type="number" min="0.01" step="0.01" data-field="cantidad" value="${l.cantidad}" style="width:70px" oninput="recalcImporte(${l.id})"></td>
        <td><input class="ed-input" type="number" min="0" step="0.01" data-field="precio_unitario" value="${l.precio_unitario}" style="width:90px" oninput="recalcImporte(${l.id})"></td>
        <td class="importe-cell" id="imp-${l.id}">${fmt(l.importe)} €</td>
        <td><select class="ed-select" data-field="tipo_pago" style="width:90px">
          <option value="" ${!l.tipo_pago?'selected':''}>—</option>
          <option value="contado" ${l.tipo_pago==='contado'?'selected':''}>Contado</option>
          <option value="credito" ${l.tipo_pago==='credito'?'selected':''}>Crédito</option>
        </select></td>
        <td><button class="btn-del-linea" onclick="eliminarLinea(${l.id})" title="Eliminar">×</button></td>
      </tr>`;
    }).join('');
  } else {
    tb.innerHTML = sorted.map(l => `
      <tr class="${l.modificado_por?'modificada':''}">
        ${columnasOrden.map(k => renderCell(l,k)).join('')}
      </tr>`).join('');
  }
}

function renderResumen() {
  if (!datos.length) { document.getElementById('resumen').style.display='none'; return; }
  document.getElementById('resumen').style.display='grid';
  document.getElementById('r-lineas').textContent    = datos.length;
  document.getElementById('r-ventas').textContent = new Set(datos.map(l=>l.ticket)).size;
  document.getElementById('r-total').textContent     = fmt(datos.reduce((s,l)=>s+l.importe,0))+' €';
  document.getElementById('r-esp').textContent       = datos.filter(l=>l.especial).length;
  document.getElementById('r-mod').textContent       = datos.filter(l=>l.modificado_por).length;
}

// ── Modo edición ──────────────────────────────────────────────────────────────
function toggleEdicion() { modoEdicion ? cancelarEdicion() : activarEdicion(); }

function activarEdicion() {
  modoEdicion = true;
  document.getElementById('btn-editar').textContent = '✕ Salir de edición';
  document.getElementById('btn-editar').classList.add('activo');
  document.getElementById('barra-edicion').classList.add('show');
  renderTabla();
}

function cancelarEdicion() {
  modoEdicion = false;
  document.getElementById('btn-editar').textContent = '&#9998;&#65039; Editar selección';
  document.getElementById('btn-editar').classList.remove('activo');
  document.getElementById('barra-edicion').classList.remove('show');
  datos = datos.map(l => ({...originales[l.id]}));
  renderTabla();
}

function getValoresFila(tr) {
  const vals = {};
  tr.querySelectorAll('[data-field]').forEach(el => {
    vals[el.dataset.field] = el.tagName==='SELECT' ? el.value : parseFloat(el.value)||el.value;
  });
  return vals;
}

async function articuloCambiado(id, sel) {
  const artId = parseInt(sel.value);
  const l = datos.find(x => x.id===id);
  if (!l) return;
  const data = await fetch(`/api/precio/${l.cliente_id}/${artId}`).then(r=>r.json()).catch(()=>null);
  const tr = sel.closest('tr');
  const precioInput = tr.querySelector('[data-field="precio_unitario"]');
  if (data && precioInput) precioInput.value = data.precio;
  recalcImporte(id);
}

function recalcImporte(id) {
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  if (!tr) return;
  const cant   = parseFloat(tr.querySelector('[data-field="cantidad"]').value)||0;
  const precio = parseFloat(tr.querySelector('[data-field="precio_unitario"]').value)||0;
  const cell   = document.getElementById(`imp-${id}`);
  if (cell) cell.textContent = fmt(cant * precio) + ' €';
}

async function eliminarLinea(id) {
  if (!confirm('¿Eliminar esta línea? Si es la última del ticket, el ticket también desaparecerá.')) return;
  const res = await fetch(`/api/lineas/${id}?modificado_por=${encodeURIComponent(operario?.nombre||'')}`,
    {method:'DELETE'}).then(r=>r.json());
  if (res.ok) {
    datos = datos.filter(l=>l.id!==id);
    delete originales[id];
    renderTabla(); renderResumen();
  }
}

async function guardarEdicion() {
  const filas = document.querySelectorAll('#tbody tr[data-id]');
  const cambios = [];
  filas.forEach(tr => {
    const id   = parseInt(tr.dataset.id);
    const v    = getValoresFila(tr);
    const orig = originales[id];
    const artId  = parseInt(v.articulo_id)||orig.articulo_id;
    const cant   = parseFloat(v.cantidad)||orig.cantidad;
    const precio = parseFloat(v.precio_unitario)||orig.precio_unitario;
    const pago   = v.tipo_pago ?? orig.tipo_pago;
    if (artId!==orig.articulo_id || cant!==orig.cantidad ||
        precio!==orig.precio_unitario || pago!==orig.tipo_pago) {
      cambios.push({id, articulo_id:artId, cantidad:cant,
        precio_unitario:precio, tipo_pago:pago,
        modificado_por: operario?.nombre || 'desconocido'});
    }
  });
  if (!cambios.length) { cancelarEdicion(); return; }
  const res = await fetch('/api/lineas', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(cambios)
  }).then(r=>r.json());
  if (res.ok) { cancelarEdicion(); await buscar(); }
}

// ── Perfiles ──────────────────────────────────────────────────────────────────
let perfilActivo = null, perfilesLista = [];

async function cargarPerfiles() {
  perfilesLista = await apiCargarPerfiles('consultas', operario.id);
  renderSelectPerfiles(perfilesLista, perfilActivo?.id);
  document.getElementById('btn-borrar-perfil').style.display = perfilActivo ? 'block' : 'none';
}

function aplicarPerfil(id) {
  if (!id) {
    perfilActivo = null;
    document.getElementById('btn-borrar-perfil').style.display = 'none';
    document.getElementById('perfil-info').textContent = '';
    anchos = {};
    columnasOrden = [...COLS_CFG.filter(c=>c.en_default).map(c=>c.campo), ...(window._camposExtra||[])];
    renderTabla(); return;
  }
  const p = perfilesLista.find(x => x.id == id);
  if (!p) return;
  perfilActivo = p;
  document.getElementById('btn-borrar-perfil').style.display = 'block';
  document.getElementById('perfil-info').textContent = `Perfil activo: ${p.nombre}`;
  if (p.config?.columnas) {
    columnasOrden = p.config.columnas.map(c => c.campo);
    anchos = {};
    p.config.columnas.forEach(c => { if (c.ancho) anchos[c.campo] = c.ancho; });
    const nuevos = (window._camposExtra||[]).filter(k => !columnasOrden.includes(k));
    columnasOrden = [...columnasOrden, ...nuevos];
  } else {
    columnasOrden = [...COLS_CFG.filter(c=>c.en_default).map(c=>c.campo), ...(window._camposExtra||[])];
    anchos = {};
  }
  renderTabla();
}

function abrirModalPerfil() {
  document.getElementById('perfil-nombre').value = perfilActivo ? perfilActivo.nombre : '';
  document.getElementById('modal-perfil').classList.add('show');
  document.getElementById('perfil-nombre').focus();
}
function cerrarModalPerfil() { document.getElementById('modal-perfil').classList.remove('show'); }

async function guardarPerfil() {
  const nombre = document.getElementById('perfil-nombre').value.trim();
  if (!nombre) { alert('Escribe un nombre para el perfil'); return; }
  const config = { columnas: columnasOrden.map(k => ({campo:k, ancho: getAncho(k)})) };
  if (perfilActivo) {
    await apiActualizarPerfil(perfilActivo.id, 'consultas', operario.id, nombre, config);
    perfilActivo.nombre = nombre; perfilActivo.config = config;
  } else {
    const res = await apiCrearPerfil('consultas', operario.id, nombre, config);
    if (res.ok) {
      await cargarPerfiles();
      document.getElementById('perfil-select').value = res.id;
      aplicarPerfil(res.id);
    }
  }
  cerrarModalPerfil();
  await cargarPerfiles();
}

async function guardarConfigPerfil() {
  if (!perfilActivo) return;
  const config = { columnas: columnasOrden.map(k => ({campo:k, ancho: getAncho(k)})) };
  await apiActualizarPerfil(perfilActivo.id, 'consultas', operario.id, perfilActivo.nombre, config);
  perfilActivo.config = config;
}

async function borrarPerfil() {
  if (!perfilActivo) return;
  if (!confirm(`¿Borrar el perfil "${perfilActivo.nombre}"?`)) return;
  await apiBorrarPerfil(perfilActivo.id);
  perfilActivo = null; anchos = {};
  columnasOrden = [...COLS_CFG.filter(c=>c.en_default).map(c=>c.campo), ...(window._camposExtra||[])];
  document.getElementById('perfil-select').value = '';
  document.getElementById('btn-borrar-perfil').style.display = 'none';
  document.getElementById('perfil-info').textContent = '';
  renderTabla(); await cargarPerfiles();
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
init();
</script>
